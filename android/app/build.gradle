plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

def envName = project.hasProperty("env") ? project.getProperty("env") : "test"
def appName = envName == "test" ? "云链测试版" : "云链"

android {
    namespace = "com.mugroup.cloud"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.mugroup.cloud"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        // 保留 Flutter 插件原有的 manifestPlaceholders（如 applicationName），只追加 appName
        manifestPlaceholders = (manifestPlaceholders ?: [:]) + [appName: appName]
    }

    // 先使用证书轮替， 等后续时间长了 改为配置
    // signingConfigs {
    //     debug {
    //         enableV3Signing = true
    //         storeFile file(STORE_FILE)
    //         storePassword STORE_PASSWORD
    //         keyAlias KEY_ALIAS
    //         keyPassword KEY_PASSWORD
    //     }
    //     release {
    //         enableV3Signing = true
    //         storeFile file(STORE_FILE)
    //         storePassword STORE_PASSWORD
    //         keyAlias KEY_ALIAS
    //         keyPassword KEY_PASSWORD
    //     }
    // }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

// 在 assembleRelease 之后复制一份 APK，保留 Flutter 默认的 app-release.apk
// 生成的文件名格式：yunlian_<env>_<versionName>+<versionCode>.apk
// - env 来自 Gradle 参数 -Penv（缺省为 test）
// - versionName / versionCode 来自上面的 flutterVersionName / flutterVersionCode
tasks.register("copyReleaseApk") {
    doLast {
        def apkDir = file("$buildDir/outputs/flutter-apk")
        def oldFile = file("$apkDir/app-release.apk")
        if (oldFile.exists()) {
            def newFile = file("$apkDir/yunlian_${envName}_${flutterVersionName}+${flutterVersionCode}.apk")
            if (newFile.exists()) {
                newFile.delete()
            }
            newFile.bytes = oldFile.bytes
            // 绿色输出 APK 路径
            println "\u001B[32mAPK file location: ${newFile.absolutePath}\u001B[0m"
        } else {
            println "Warning: app-release.apk not found, APK with environment naming not generated."
        }
    }
}

// 让 assembleRelease 在完成后自动执行复制任务
tasks.whenTaskAdded { task ->
    if (task.name == "assembleRelease") {
        task.finalizedBy("copyReleaseApk")
    }
}
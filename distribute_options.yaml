variables:
  PGYER_API_KEY: '31c5ea9587585056f17b8fd2a85ec69b'
output: dist/
releases:
  - name: dev
    jobs:
      - name: android
        package:
          platform: android
          target: apk
          build_args:
            target-platform: android-arm,android-arm64
            dart-define:
              APP_ENV: dev
        publish_to: pgyer
      - name: ios
        package:
          platform: ios
          target: ipa
          build_args:
            export-options-plist: ios/adhoc_ExportOptions.plist
            dart-define:
              APP_ENV: dev
        publish_to: pgyer